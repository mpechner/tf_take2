---
- name: Configure OpenVPN TLS Certificate Sync
  hosts: all
  become: true
  gather_facts: true
  vars:
    # Use /tmp for Ansible temp files (openvpnas user has limited home permissions)
    ansible_remote_tmp: /tmp/.ansible-${USER}
    ansible_local_tmp: /tmp/.ansible-${USER}
    sync_script_path: "/usr/local/bin/sync-vpn-tls.sh"
    # Pinned AWS CLI version — update this when a new version is needed.
    # Check https://raw.githubusercontent.com/aws/aws-cli/v2/CHANGELOG.rst for releases.
    awscli_version: "2.15.30"
    # These are passed from the setup script via -e arguments
    # vpn_fqdn: "vpn.dev.foobar.support"
    # tls_secret_name: "openvpn/dev"
    # tls_secret_region: "us-west-2"

  tasks:
    - name: Install unzip (required for AWS CLI)
      apt:
        name: unzip
        state: present
        update_cache: yes

    - name: Check if AWS CLI v2 is installed
      shell: command -v aws && aws --version 2>&1 || echo "NOT_INSTALLED"
      register: aws_cli_check
      ignore_errors: yes
      changed_when: false

    - name: Install AWS CLI v2
      shell: |
        INSTALLED_VERSION=$(aws --version 2>&1 | grep -oP 'aws-cli/\K[0-9.]+' || echo "none")
        if [ "$INSTALLED_VERSION" != "{{ awscli_version }}" ]; then
          WORK_DIR=$(mktemp -d)
          trap "rm -rf '$WORK_DIR'" EXIT
          cd "$WORK_DIR"
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64-{{ awscli_version }}.zip"        -o "awscliv2.zip"
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64-{{ awscli_version }}.zip.sha256" -o "awscliv2.zip.sha256"
          # Verify checksum before executing anything
          sha256sum --check awscliv2.zip.sha256
          unzip -q -o awscliv2.zip
          ./aws/install --update
        fi
      when: aws_cli_check.stdout is search('NOT_INSTALLED') or not aws_cli_check.stdout is search('aws-cli/2')

    - name: Create TLS sync script
      copy:
        dest: "{{ sync_script_path }}"
        mode: '0755'
        content: |
          #!/bin/bash
          # Sync TLS certificate from AWS Secrets Manager to OpenVPN
          # Runs every 30 minutes via cron
          
          set -e
          
          SECRET_NAME="{{ tls_secret_name }}"
          SECRET_REGION="{{ tls_secret_region }}"
          
          # Use public endpoint (bypass VPC endpoint which times out from public subnet)
          AWS_CLI="aws --endpoint-url https://secretsmanager.${SECRET_REGION}.amazonaws.com"
          LOG_FILE="/var/log/openvpn-tls-sync.log"
          CERT_DIR="/usr/local/openvpn_as/etc/web-ssl"
          STAMP_FILE="/var/run/openvpn-tls-stamp"
          
          # OpenVPN Access Server cert paths
          SERVER_CERT="$CERT_DIR/server.crt"
          SERVER_KEY="$CERT_DIR/server.key"
          
          log() {
              echo "[$(date '+%Y-%m-%d %H:%M:%S')] $1" | tee -a "$LOG_FILE"
          }
          
          # Ensure cert directory exists
          mkdir -p "$CERT_DIR"
          
          # Check if secret exists in Secrets Manager
          log "Checking secret: $SECRET_NAME in region $SECRET_REGION"
          if ! $AWS_CLI secretsmanager describe-secret --secret-id "$SECRET_NAME" --region "$SECRET_REGION" 2>/dev/null; then
              log "⚠️ Secret $SECRET_NAME does not exist yet. Will retry on next run."
              exit 0
          fi
          
          # Get secret value
          log "Fetching secret value..."
          SECRET_VALUE=$($AWS_CLI secretsmanager get-secret-value --secret-id "$SECRET_NAME" --region "$SECRET_REGION" --query 'SecretString' --output text 2>/dev/null)
          
          if [ -z "$SECRET_VALUE" ]; then
              log "⚠️ Secret value is empty. Will retry on next run."
              exit 0
          fi
          
          # Create a secure temp directory — cleaned up on exit regardless of success/failure
          WORK_DIR=$(mktemp -d /root/.openvpn-tls-sync-XXXXXX)
          chmod 700 "$WORK_DIR"
          trap "rm -rf '$WORK_DIR'" EXIT

          NEW_CERT="$WORK_DIR/new_cert.crt"
          NEW_KEY="$WORK_DIR/new_key.key"
          CHAIN_PEM="$WORK_DIR/chain.pem"

          # Extract certificate and key into the secure temp dir
          echo "$SECRET_VALUE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          if 'fullchain_pem' in data:
              print(data.get('fullchain_pem', ''))
          elif 'certificate' in data:
              print(data.get('certificate', ''))
          elif 'tls.crt' in data:
              print(data.get('tls.crt', ''))
          else:
              print('')
          " > "$NEW_CERT"
          chmod 600 "$NEW_CERT"

          echo "$SECRET_VALUE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          if 'privkey_pem' in data:
              print(data.get('privkey_pem', ''))
          elif 'private_key' in data:
              print(data.get('private_key', ''))
          elif 'tls.key' in data:
              print(data.get('tls.key', ''))
          else:
              print('')
          " > "$NEW_KEY"
          chmod 600 "$NEW_KEY"

          # Validate extracted files
          if [ ! -s "$NEW_CERT" ] || [ ! -s "$NEW_KEY" ]; then
              log "⚠️ Could not extract certificate or key from secret"
              exit 0
          fi

          # Decode if base64 encoded
          if head -1 "$NEW_CERT" | grep -q '^[A-Za-z0-9+/=]\+$'; then
              base64 -d "$NEW_CERT" > "$WORK_DIR/decoded_cert.crt" 2>/dev/null && mv "$WORK_DIR/decoded_cert.crt" "$NEW_CERT" || true
              base64 -d "$NEW_KEY"  > "$WORK_DIR/decoded_key.key"  2>/dev/null && mv "$WORK_DIR/decoded_key.key"  "$NEW_KEY"  || true
          fi

          # Verify certificate matches expected FQDN ({{ vpn_fqdn }})
          CERT_CN=$(openssl x509 -in "$NEW_CERT" -noout -subject 2>/dev/null | grep -o 'CN = [^,]*' | sed 's/CN = //')
          if [ -n "$CERT_CN" ] && [ "$CERT_CN" != "{{ vpn_fqdn }}" ]; then
              log "⚠️ Certificate CN ($CERT_CN) does not match expected FQDN ({{ vpn_fqdn }})"
              log "   Proceeding anyway, but verify this is correct."
          fi

          # Compute fingerprint of new certificate
          NEW_FINGERPRINT=$(openssl x509 -in "$NEW_CERT" -noout -pubkey 2>/dev/null | openssl sha256 2>/dev/null | awk '{print $2}')
          if [ -z "$NEW_FINGERPRINT" ]; then
              NEW_FINGERPRINT=$(sha256sum "$NEW_CERT" | awk '{print $1}')
          fi

          # Get current certificate fingerprint
          CURRENT_FINGERPRINT=""
          if [ -f "$SERVER_CERT" ]; then
              CURRENT_FINGERPRINT=$(openssl x509 -in "$SERVER_CERT" -noout -pubkey 2>/dev/null | openssl sha256 2>/dev/null | awk '{print $2}')
              if [ -z "$CURRENT_FINGERPRINT" ]; then
                  CURRENT_FINGERPRINT=$(sha256sum "$SERVER_CERT" | awk '{print $1}')
              fi
          fi

          # Compare fingerprints — exit early if cert unchanged (trap will clean up WORK_DIR)
          if [ "$NEW_FINGERPRINT" = "$CURRENT_FINGERPRINT" ]; then
              log "✅ Certificate unchanged (fingerprint: $NEW_FINGERPRINT). No action needed."
              exit 0
          fi

          log "🔄 Certificate changed! Installing new certificate..."
          log "  Old fingerprint: $CURRENT_FINGERPRINT"
          log "  New fingerprint: $NEW_FINGERPRINT"

          # Backup current certs
          if [ -f "$SERVER_CERT" ]; then
              cp "$SERVER_CERT" "$SERVER_CERT.backup.$(date +%s)"
          fi
          if [ -f "$SERVER_KEY" ]; then
              cp "$SERVER_KEY" "$SERVER_KEY.backup.$(date +%s)"
          fi

          # Install new certificates using sacli (proper OpenVPN AS method)
          log "🔧 Configuring OpenVPN Access Server with new certificate..."

          # Use sacli ConfigPut to import the certificate and key
          # OpenVPN AS 3.0+ uses cs.cert, cs.priv_key, and cs.ca_bundle config keys
          cd /usr/local/openvpn_as/scripts

          # Extract the intermediate chain from fullchain (all certs except the first/leaf)
          awk 'BEGIN{n=0; buf=""; out=""}
               /-----BEGIN CERTIFICATE-----/{n++; buf=$0"\n"; next}
               /-----END CERTIFICATE-----/{buf=buf$0"\n"; if(n>1) out=out buf; buf=""; next}
               {buf=buf$0"\n"}
               END{if(n>1 && buf!="") out=out buf; print out}' "$NEW_CERT" > "$CHAIN_PEM" 2>/dev/null || echo "" > "$CHAIN_PEM"

          # Import the certificate, private key, and CA bundle
          ./sacli --key "cs.cert"     --value_file "$NEW_CERT"  ConfigPut 2>&1 | tee -a "$LOG_FILE"
          ./sacli --key "cs.priv_key" --value_file "$NEW_KEY"   ConfigPut 2>&1 | tee -a "$LOG_FILE"

          # Only import chain if it has content
          if [ -s "$CHAIN_PEM" ]; then
              ./sacli --key "cs.ca_bundle" --value_file "$CHAIN_PEM" ConfigPut 2>&1 | tee -a "$LOG_FILE"
          fi
          
          # Restart the web server component only (not the entire service)
          log "🔄 Restarting OpenVPN Access Server web services..."
          ./sacli start
          
          sleep 5
          
          # Verify the web service is running
          if ./sacli status | grep -q '"web": "on"'; then
              log "✅ OpenVPN Access Server web service is running with new certificate"
          else
              log "⚠️ Web service may not have started properly. Check status with: ./sacli status"
          fi

          # Save fingerprint for next comparison
          echo "$NEW_FINGERPRINT" > "$STAMP_FILE"

          log "✅ Certificate sync complete"
          # WORK_DIR is cleaned up automatically by trap EXIT

    - name: Create cron job for TLS sync (every 30 minutes between midnight and 3am)
      cron:
        name: "OpenVPN TLS Certificate Sync"
        minute: "*/30"
        hour: "0-2"
        job: "{{ sync_script_path }} >> /var/log/openvpn-tls-sync.log 2>&1"
        user: root

    - name: Create initial stamp file
      file:
        path: /var/run/openvpn-tls-stamp
        state: touch
        mode: '0644'

    - name: Note about initial sync
      debug:
        msg:
          - "TLS sync script installed at {{ sync_script_path }}"
          - "Cron job will run every 30 minutes to sync certificate"
          - "First sync will happen automatically via cron"
          - "Or run manually: sudo {{ sync_script_path }}"

    - name: Verify script exists and is executable
      stat:
        path: "{{ sync_script_path }}"
      register: script_stat

    - name: Display verification results
      debug:
        msg:
          - "Script exists: {{ script_stat.stat.exists }}"
          - "Script executable: {{ script_stat.stat.executable }}"
          - "Cron job configured for secret: {{ tls_secret_name }}"
          - "To check logs: tail -f /var/log/openvpn-tls-sync.log"
